<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit — BabiPlay CI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0b0b0e;--bg2:#111116;--bg3:#18181f;--bg4:#1e1e28;--border:#2a2a36;--border2:#363644;--text:#e8e8f0;--muted:#5a5a78;--muted2:#8888aa;--gold:#f5a623;--gold2:#ffbe55;--r:10px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

nav{position:sticky;top:0;z-index:100;background:rgba(11,11,14,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;background:linear-gradient(100deg,#f5a623,#ff7f50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.back-btn:hover{color:var(--text);border-color:var(--border2)}

/* HERO */
.hero{position:relative;padding:18px 16px 14px;border-bottom:1px solid var(--border)}
@media(min-width:700px){.hero{padding:22px 40px 18px}}
.hero-content{max-width:1100px;margin:0 auto}
.hero-plat{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase}
.hero-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;line-height:1.2;margin-bottom:6px}
@media(min-width:700px){.hero-title{font-size:38px}}
.hero-meta{font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:10px}

/* LAYOUT — grille à zones nommées : sur mobile l'ordre visuel est achat → infos (le client
   voit l'image + le prix + le bouton d'achat tout de suite, puis descend s'il veut en savoir
   plus). Sur grand écran, la colonne achat reste fixe à droite pendant que les infos défilent
   à gauche. */
.product-layout{
  max-width:1100px;margin:0 auto;padding:16px;
  display:grid;gap:14px;
  grid-template-columns:1fr;
  grid-template-areas:"achat" "infos";
}
.layout-achat{grid-area:achat}
.layout-infos{grid-area:infos;display:flex;flex-direction:column;gap:14px}
@media(min-width:900px){
  .product-layout{
    grid-template-columns:1fr 300px;
    grid-template-areas:"infos achat";
    align-items:start;
  }
}

/* GALERIE */
.gallery-main{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:14px;border:1px solid var(--border)}
.gallery-fb{width:100%;aspect-ratio:16/9;border-radius:14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:60px}
.fb-psn{background:linear-gradient(140deg,#001a50,#0057b8)}
.fb-xbox{background:linear-gradient(140deg,#0a3d0a,#107c10)}
.fb-pc{background:linear-gradient(140deg,#0d1520,#2a475e)}
.fb-nintendo{background:linear-gradient(140deg,#8b0009,#e60012)}
.fb-streaming{background:linear-gradient(140deg,#2a1050,#a970ff)}

/* INFOS PRODUIT */
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.info-box h3{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-desc{font-size:13px;color:var(--muted2);line-height:1.7}

/* ACTIVATION STEPS */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;align-items:flex-start;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#000;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-content h4{font-size:13px;font-weight:600;margin-bottom:2px}
.step-content p{font-size:12px;color:var(--muted2);line-height:1.5}

/* TABS ACTIVATION */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:var(--bg3);border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.08)}

/* TABLEAU D'INFOS (façon Instant Gaming) */
.specs-table{width:100%;border-collapse:collapse}
.specs-table tr{border-bottom:1px solid var(--border)}
.specs-table tr:last-child{border-bottom:none}
.specs-table td{padding:9px 0;font-size:13px;vertical-align:top}
.specs-table td:first-child{color:var(--muted2);width:42%;padding-right:12px}
.specs-table td:last-child{color:var(--text);font-weight:500}

/* GALERIE / VIDÉO */
.gallery-yt-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#000}
.gallery-yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.gallery-thumbs{display:flex;gap:8px;margin-top:8px;overflow-x:auto}
.gallery-thumb{width:64px;height:64px;flex-shrink:0;object-fit:cover;border-radius:8px;border:2px solid var(--border);cursor:pointer;opacity:.6;transition:all .2s}
.gallery-thumb:hover{opacity:.85}
.gallery-thumb.active{border-color:var(--gold);opacity:1}

/* AUTRES ÉDITIONS : réutilise .sim-card / .sim-grid, définis plus bas */

/* COLONNE DROITE — ACHAT */
.buy-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px;position:sticky;top:72px}
@media(min-width:900px){.buy-box{min-width:280px;max-width:300px}}
.buy-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin-bottom:4px}
.buy-img-fb{width:100%;aspect-ratio:16/9;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:40px}
.buy-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;line-height:1.3}
.buy-price{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;color:var(--gold);line-height:1}
.buy-price small{display:block;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted2);font-weight:400}
.buy-stock{font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:5px}
.buy-stock-dot{width:7px;height:7px;border-radius:50%;background:#52b043;flex-shrink:0}
.btn-add{width:100%;background:linear-gradient(100deg,#f5a623,#ff8c00);border:none;color:#000;padding:14px;border-radius:12px;font-size:16px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:1px;cursor:pointer;transition:opacity .2s}
.btn-add:active{opacity:.85}
.buy-perks{display:flex;flex-direction:column;gap:7px}
.perk{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted2)}
.perk-icon{font-size:16px;flex-shrink:0}

/* SIMILAIRES */
.sim-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.sim-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.sim-grid{grid-template-columns:repeat(4,1fr)}}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:var(--text);transition:border-color .2s}
.sim-card:hover{border-color:var(--gold)}
.sim-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.sim-card-fb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:24px}
.sim-info{padding:8px 10px}
.sim-name{font-size:12px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sim-price{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--gold)}

.section-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px;padding:0 16px}
@media(min-width:900px){.section-title{padding:0}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--gold);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#52b043}

.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">← Retour</a>
  <a class="logo" href="index.html">BabiPlay</a>
</nav>

<div id="page-content">
  <!-- Chargement skeleton -->
  <div style="padding:20px 16px;display:flex;flex-direction:column;gap:14px">
    <div class="skeleton" style="height:220px;border-radius:14px"></div>
    <div class="skeleton" style="height:60px;border-radius:8px;max-width:300px"></div>
    <div class="skeleton" style="height:180px;border-radius:14px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sb, produit = null, allProducts = [];
const params = new URLSearchParams(location.search);
const prodId = params.get('id');

const fmt = n => (n || 0).toLocaleString('fr-FR');
const pEmoji = p => ({ psn:'🎮', xbox:'🕹️', pc:'🖥️', nintendo:'🔴', streaming:'📺' }[p] || '🎮');
const pLabel = p => ({ psn:'PlayStation', xbox:'Xbox', pc:'PC', nintendo:'Nintendo', streaming:'Streaming & Apps' }[p] || p);
const pColor = p => ({ psn:'#5baeff', xbox:'#7dd670', pc:'#66c0f4', nintendo:'#ff6b6b', streaming:'#a970ff' }[p] || '#f5a623');
const pFbClass = p => ({ psn:'fb-psn', xbox:'fb-xbox', pc:'fb-pc', nintendo:'fb-nintendo', streaming:'fb-streaming' }[p] || 'fb-pc');

// Détecte un lien YouTube et le convertit en lien intégrable, en boucle et muet
function getYouTubeEmbed(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  if (!m) return null;
  const id = m[1];
  return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=1&modestbranding=1&playsinline=1&rel=0`;
}

const STEPS = {
  psn: [
    { t: 'Connectez-vous au PlayStation Store', d: "Depuis votre PS4, PS5 ou via store.playstation.com" },
    { t: 'Accédez au porte-monnaie', d: "Profil → PlayStation Store → Alimenter le porte-monnaie" },
    { t: 'Entrez votre code', d: "Saisissez les 12 caractères du code reçu par email" },
    { t: 'C\'est crédité !', d: "Les fonds sont immédiatement disponibles sur votre compte" },
  ],
  xbox: [
    { t: 'Allumez votre console Xbox ou ouvrez Xbox.com', d: "Connectez-vous à votre compte Microsoft" },
    { t: 'Accédez à "Utiliser un code"', d: "Menu → Microsoft Store → Utiliser un code" },
    { t: 'Entrez votre code à 25 caractères', d: "Format XXXXX-XXXXX-XXXXX-XXXXX-XXXXX" },
    { t: 'Confirmez et profitez !', d: "Le crédit ou l'abonnement est activé instantanément" },
  ],
  nintendo: [
    { t: 'Accédez au Nintendo eShop', d: "Depuis votre Switch, ouvrez le Nintendo eShop" },
    { t: 'Cliquez sur votre profil', d: "En haut à droite → Entrer un code" },
    { t: 'Saisissez votre code à 16 caractères', d: "Format XXXX-XXXX-XXXX-XXXX" },
    { t: 'Confirmez !', d: "Le crédit est ajouté à votre compte Nintendo immédiatement" },
  ],
  pc: [
    { t: 'Ouvrez Steam / Epic / Battle.net', d: "Lancez l'application correspondante sur votre PC" },
    { t: 'Accédez à \"Activer un produit\"', d: "Steam : Jeux → Activer un produit | Epic : Compte → Codes" },
    { t: 'Entrez votre code', d: "Copiez-collez le code reçu par email" },
    { t: 'Téléchargez et jouez !', d: "Le jeu ou le crédit est ajouté à votre bibliothèque" },
  ],
  streaming: [
    { t: 'Connectez-vous à votre compte', d: "Utilisez votre compte Netflix, Spotify, Disney+ ou Crunchyroll existant (ou créez-en un gratuitement)" },
    { t: 'Allez sur la page de validation de code', d: "Depuis le site officiel du service, section \"Carte cadeau\" ou \"Redeem\"" },
    { t: 'Entrez votre code', d: "Saisissez le code reçu par email juste après votre paiement" },
    { t: 'Profitez !', d: "L'abonnement est actif immédiatement sur tous vos appareils (téléphone, TV, ordinateur...)" },
  ],
};

(async () => {
  const r = await fetch('/.netlify/functions/get-config');
  const c = await r.json();
  sb = supabase.createClient(c.surl, c.skey);

  if (!prodId) { render404(); return; }

  // Supabase plafonne chaque requête à 1000 lignes par défaut ; on a plus de 4000 produits
  // actifs, donc on pagine avec .range() pour tout récupérer (sinon les sections "Autres
  // éditions" / "Produits similaires" pouvaient être vides pour les produits au-delà de la 1000e ligne).
  async function loadAllActiveProducts() {
    const pageSize = 1000;
    let from = 0;
    let all = [];
    while (true) {
      const { data, error } = await sb.from('products')
        .select('id, nom, prix, image_url, plateforme, sous_categorie')
        .eq('est_actif', true).range(from, from + pageSize - 1);
      if (error) { console.error('Erreur chargement produits:', error.message); break; }
      if (!data || !data.length) break;
      all = all.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }
    return all;
  }

  const [{ data: p }, all] = await Promise.all([
    sb.from('products').select('*').eq('id', prodId).single(),
    loadAllActiveProducts()
  ]);

  if (!p) { render404(); return; }
  produit = p;
  allProducts = all || [];
  document.title = p.nom + ' — BabiPlay CI';
  renderPage();
})();

function renderPage() {
  const p = produit;
  const color = pColor(p.plateforme);
  const delai = p.delai_livraison_jours || 7;
  const steps = p.est_physique ? [
    { t: 'Commande confirmée', d: "Votre paiement est validé et votre commande est enregistrée" },
    { t: 'Préparation', d: "Nous récupérons et préparons votre article avec soin" },
    { t: 'Expédition', d: `Livraison vers la Côte d'Ivoire — délai annoncé : ${delai} jours` },
    { t: 'Réception', d: "Vous êtes contacté(e) pour organiser la remise du colis" },
  ] : (STEPS[p.plateforme] || STEPS.pc);
  const editions = allProducts.filter(x => x.plateforme === p.plateforme && x.sous_categorie === p.sous_categorie && x.id !== p.id).slice(0, 6);
  const similaires = allProducts.filter(x => x.plateforme === p.plateforme && x.id !== p.id && x.sous_categorie !== p.sous_categorie).slice(0, 8);

  const ytEmbed = getYouTubeEmbed(p.video_url);
  const galerie = Array.isArray(p.images) && p.images.length ? p.images : (p.image_url ? [p.image_url] : []);
  const imgHtml = ytEmbed
    ? `<div class="gallery-yt-wrap"><iframe src="${ytEmbed}" allow="autoplay; encrypted-media" allowfullscreen title="${p.nom}"></iframe></div>`
    : galerie.length
      ? `<img src="${galerie[0]}" alt="${p.nom}" class="gallery-main" id="gallery-main-img">
         ${galerie.length > 1 ? `<div class="gallery-thumbs">${galerie.map((src, i) => `<img src="${src}" class="gallery-thumb${i === 0 ? ' active' : ''}" onclick="document.getElementById('gallery-main-img').src=this.src;document.querySelectorAll('.gallery-thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active')">`).join('')}</div>` : ''}`
      : `<div class="gallery-fb ${pFbClass(p.plateforme)}">${pEmoji(p.plateforme)}</div>`;

  const specsRows = [
    ['Compatibilité région', 'Europe (France incluse)'],
    ['Genres', p.genres],
    ['Développeur', p.developpeur],
    ['Éditeur', p.editeur],
    ['Date de sortie', p.date_sortie],
    ['Note Metacritic', p.note_metacritic ? `${p.note_metacritic}/100` : ''],
  ].filter(([, val]) => val);

  const specsHtml = specsRows.length > 0 ? `
    <div class="info-box">
      <h3>ℹ️ Informations</h3>
      <table class="specs-table">
        ${specsRows.map(([label, val]) => `<tr><td>${label}</td><td>${val}</td></tr>`).join('')}
      </table>
    </div>` : '';

  const editionsHtml = editions.length > 0 ? `
    <div class="info-box">
      <h3>📦 Autres montants / éditions</h3>
      <div class="sim-grid">
        ${editions.map(e => `
          <a class="sim-card" href="produit.html?id=${e.id}">
            ${e.image_url
              ? `<img src="${e.image_url}" alt="${e.nom}" loading="lazy">`
              : `<div class="sim-card-fb ${pFbClass(e.plateforme)}">${pEmoji(e.plateforme)}</div>`}
            <div class="sim-info">
              <div class="sim-name">${e.nom}</div>
              <div class="sim-price">${fmt(e.prix)} FCFA</div>
            </div>
          </a>`).join('')}
      </div>
    </div>` : '';

  const similairesHtml = similaires.length > 0 ? `
    <div style="padding:0 16px 32px;max-width:1100px;margin:0 auto">
      <div class="section-title" style="padding:0">🎮 Vous aimerez aussi</div>
      <div class="sim-grid">
        ${similaires.map(s => `
          <a class="sim-card" href="produit.html?id=${s.id}">
            ${s.image_url
              ? `<img src="${s.image_url}" alt="${s.nom}" loading="lazy">`
              : `<div class="sim-card-fb ${pFbClass(s.plateforme)}">${pEmoji(s.plateforme)}</div>`}
            <div class="sim-info">
              <div class="sim-name">${s.nom}</div>
              <div class="sim-price">${fmt(s.prix)} FCFA</div>
            </div>
          </a>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('page-content').innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="hero-content">
        <span class="hero-plat" style="background:rgba(0,0,0,.3);border:1px solid ${color};color:${color}">${pEmoji(p.plateforme)} ${pLabel(p.plateforme)}</span>
        <div class="hero-title">${p.nom}</div>
        <div class="hero-meta">
          <span>${p.categorie || ''}</span>
          ${p.sous_categorie ? `<span>·</span><span>${p.sous_categorie}</span>` : ''}
          ${p.est_populaire ? '<span>·</span><span>⭐ Populaire</span>' : ''}
        </div>
      </div>
    </div>

    <!-- LAYOUT -->
    <div class="product-layout">
      <!-- ACHAT -->
      <div class="layout-achat">
        <div class="buy-box">
          ${imgHtml}
          <div class="buy-name">${p.nom}</div>
          <div>
            <div class="buy-price">${fmt(p.prix)} <small>FCFA</small></div>
          </div>
          <div class="buy-stock"><div class="buy-stock-dot"></div> ${p.est_physique ? `En stock — livraison sous ${delai} jours` : 'En stock — livraison immédiate'}</div>
          <button class="btn-add" onclick="addToCart()">🛒 Ajouter au panier</button>
          <div class="buy-perks">
            <div class="perk"><span class="perk-icon">${p.est_physique ? '🚚' : '📧'}</span><span>${p.est_physique ? `Livraison en ${delai} jours` : 'Code envoyé par email instantanément'}</span></div>
            <div class="perk"><span class="perk-icon">📱</span><span>Orange Money · MTN · Moov · Wave</span></div>
            <div class="perk"><span class="perk-icon">💬</span><span>Support WhatsApp disponible</span></div>
            <div class="perk"><span class="perk-icon">🔒</span><span>Paiement 100% sécurisé PayDunya</span></div>
          </div>
        </div>
      </div>

      <!-- INFOS -->
      <div class="layout-infos">
        <!-- Description -->
        <div class="info-box">
          <h3>📋 À propos de ce produit</h3>
          <p class="info-desc">${p.description || 'Code numérique livré par email après paiement.'}</p>
        </div>

        ${specsHtml}

        ${p.image_url ? `<img src="${p.image_url}" alt="${p.nom}" style="width:100%;border-radius:14px;border:1px solid var(--border)">` : ''}

        <!-- Activation -->
        <div class="info-box">
          <h3>${p.est_physique ? '🚚 Comment se passe la livraison ?' : '🚀 Comment activer votre code ?'}</h3>
          <div class="steps">
            ${steps.map((s, i) => `
              <div class="step">
                <div class="step-num">${i + 1}</div>
                <div class="step-content">
                  <h4>${s.t}</h4>
                  <p>${s.d}</p>
                </div>
              </div>`).join('')}
          </div>
        </div>

        ${editionsHtml}
      </div>
    </div>

    <!-- SIMILAIRES -->
    ${similairesHtml}
  `;
}

function addToCart() {
  showToast('✅ Ajouté au panier !', 'ok');

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}
